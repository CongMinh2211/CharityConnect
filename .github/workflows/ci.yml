name: CharityConnect CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  node-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [identity, campaign]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: backend/${{ matrix.service }}/package.json }
      - run: npm ci --no-audit --no-fund
      - run: npm test
      - run: npm run build

  donation-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/donation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: backend/donation/requirements.txt }
      - run: pip install -r requirements.txt
      - run: pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package.json }
      - run: npm ci --no-audit --no-fund
      - run: npm test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [node-services, donation-service, web]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker compose build

  sonar:
    runs-on: ubuntu-latest
    needs: [node-services, donation-service, web]
    if: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
