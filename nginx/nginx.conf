events {}

http {
  upstream identity { server identity-service:3001; }
  upstream campaign { server campaign-service:3002; }
  upstream donation { server donation-service:8000; }
  upstream assistant { server assistant-service:8001; }

  # Rate limit: auth chặt (chống brute-force), API chung thoáng hơn.
  limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api_zone:10m rate=120r/m;
  limit_req_status 429;

  server {
    listen 80;
    client_max_body_size 55m;
    server_tokens off;

    # Security headers ở gateway (áp cho mọi response).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location /api/v1/auth/ {
      limit_req zone=auth_zone burst=10 nodelay;
      proxy_pass http://identity/auth/; proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/v1/profile { proxy_pass http://identity/profile; proxy_set_header Host $host; }
    location /api/v1/sessions { proxy_pass http://identity/sessions; proxy_set_header Host $host; }
    location /api/v1/sessions/ { proxy_pass http://identity/sessions/; proxy_set_header Host $host; }
    location /api/v1/me/ { proxy_pass http://identity/me/; proxy_set_header Host $host; }
    location /api/v1/organizations/ { proxy_pass http://identity/organizations/; proxy_set_header Host $host; }
    location /api/v1/admin/users { proxy_pass http://identity/admin/users; proxy_set_header Host $host; }
    location /api/v1/admin/users/ { proxy_pass http://identity/admin/users/; proxy_set_header Host $host; }
    location /api/v1/admin/organizations/ { proxy_pass http://identity/admin/organizations/; proxy_set_header Host $host; }
    location /api/v1/analytics/users/ { proxy_pass http://identity/analytics/users/; proxy_set_header Host $host; }

    location /api/v1/campaigns { proxy_pass http://campaign/campaigns; proxy_set_header Host $host; }
    location /api/v1/campaigns/ { proxy_pass http://campaign/campaigns/; proxy_set_header Host $host; }
    location /api/v1/organization/campaigns { proxy_pass http://campaign/organization/campaigns; proxy_set_header Host $host; }
    location /api/v1/organization/campaigns/ { proxy_pass http://campaign/organization/campaigns/; proxy_set_header Host $host; }
    location /api/v1/organization/impact-reports/ { proxy_pass http://campaign/organization/impact-reports/; proxy_set_header Host $host; }
    location /api/v1/admin/campaigns { proxy_pass http://campaign/admin/campaigns; proxy_set_header Host $host; }
    location /api/v1/admin/campaigns/ { proxy_pass http://campaign/admin/campaigns/; proxy_set_header Host $host; }
    location /api/v1/admin/impact-reports { proxy_pass http://campaign/admin/impact-reports; proxy_set_header Host $host; }
    location /api/v1/admin/impact-reports/ { proxy_pass http://campaign/admin/impact-reports/; proxy_set_header Host $host; }
    location /api/v1/impact-evidence/ { proxy_pass http://campaign/impact-evidence/; proxy_set_header Host $host; }
    location /api/v1/analytics/campaigns/ { proxy_pass http://campaign/analytics/campaigns/; proxy_set_header Host $host; }

    location /api/v1/donations {
      limit_req zone=api_zone burst=30 nodelay;
      proxy_pass http://donation/donations; proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/v1/donations/ { proxy_pass http://donation/donations/; proxy_set_header Host $host; }
    location /api/v1/organization/donations/ { proxy_pass http://donation/organization/donations/; proxy_set_header Host $host; }
    location /api/v1/transparency/ { proxy_pass http://donation/transparency/; proxy_set_header Host $host; }
    location /api/v1/admin/transparency/ { proxy_pass http://donation/admin/transparency/; proxy_set_header Host $host; }
    location /api/v1/analytics/donations/ { proxy_pass http://donation/analytics/donations/; proxy_set_header Host $host; }
    location /api/v1/assistant/ { proxy_pass http://assistant/assistant/; proxy_set_header Host $host; }
    location /api/v1/content/ { proxy_pass http://assistant/content/; proxy_set_header Host $host; }
    location /api/v1/admin/content/ { proxy_pass http://assistant/admin/content/; proxy_set_header Host $host; }
  }
}
